services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn backend:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501 --server.headless=true
    ports:
      - "8501:8501"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      - api

